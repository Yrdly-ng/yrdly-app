<div class="w-24 h-24 bg-surface-container-high rounded-full flex items-center justify-center border-2 border-primary shadow-[0_0_30px_rgba(130,219,126,0.3)]">

</div>
</div>

<h2 class="font-pacifico text-[28px] text-white leading-tight">₦43,650 Sent!</h2>

<span class="font-raleway font-semibold text-[11px] text-tertiary uppercase tracking-wider">Arrives within 24 hours</span>

</div>

</div>
</div>

<span class="font-body text-[12px] text-on-surface">#TXN-98234-AX</span>
</div>

<span class="font-raleway text-[11px] text-on-surface-variant uppercase tracking-tight">Date</span>
<span class="font-body text-[12px] text-on-surface">Oct 24, 2023 • 14:32</span>
</div>
</div>
</div>

<div class="flex gap-3 mb-8">
<span class="material-symbols-outlined text-secondary-fixed-dim text-3xl cursor-pointer hover:scale-110 transition-transform" data-icon="star">star</span>
